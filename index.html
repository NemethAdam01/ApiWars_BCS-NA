<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Star Wars Bolygók</title>
</head>
<body>

<div class="container">
    <h1>Star Wars Bolygók</h1>
   
    <div class="controls">
        <button id="prevBtn" disabled>Előző</button>
        <button id="nextBtn" disabled>Következő</button>
        <span id="loader">Betöltés...</span>
    </div>

    <table id="planetTable">
        <thead>
            <tr>
                <th>Név</th>
                <th>Átmérő (km)</th>
                <th>Éghajlat</th>
                <th>Terep</th>
                <th>Felszíni víz (%)</th>
                <th>Népesség</th>
                <th>Lakosok</th>
            </tr>
        </thead>
        <tbody id="planetBody">
            </tbody>
    </table>
    <script src="idnex.js"></script>
</div>
